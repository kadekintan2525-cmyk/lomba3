<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantau Tumbuh Kembang - StuntingCRACK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }

        .hero-blue {
            background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
        }

        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.05);
            border-radius: 24px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
        <span class="text-xl font-extrabold text-black">👶 StuntingCRACK</span>

        <div class="hidden md:flex space-x-8">
            <a href="menu-gizi.html">Menu Gizi</a>
            <a href="cek-tumbuh.html" class="font-bold text-orange-500">Cek Tumbuh</a>
            <a href="pusat-info.html">Pusat Info</a>
            <a href="ruang-ibu.html">Ruang Ibu</a>
        </div>
    </div>
</nav>

<!-- HERO -->
<header class="hero-blue py-20 text-white text-center">
    <h1 class="text-4xl font-extrabold">Pantau Tumbuh Kembang Anak</h1>
    <p class="mt-3 opacity-90">Deteksi stunting dengan standar WHO</p>
</header>

<!-- INPUT -->
<main class="max-w-6xl mx-auto p-6 grid lg:grid-cols-2 gap-10">

<!-- FORM -->
<section class="glass-card p-6">
    <h2 class="font-bold mb-4">Input Data Anak</h2>

    <input id="namaAnak" placeholder="Nama" class="w-full p-3 mb-3 border rounded-xl">
    <input id="umurAnak" type="number" placeholder="Umur (bulan)" class="w-full p-3 mb-3 border rounded-xl">

    <select id="genderAnak" class="w-full p-3 mb-3 border rounded-xl">
        <option value="">Jenis Kelamin</option>
        <option value="Laki-laki">Laki-laki</option>
        <option value="Perempuan">Perempuan</option>
    </select>

    <input id="tinggiAnak" type="number" placeholder="Tinggi (cm)" class="w-full p-3 mb-4 border rounded-xl">

    <button onclick="hitungStunting()" class="w-full bg-blue-500 text-white font-bold py-3 rounded-xl">
        Hitung Status Gizi
    </button>
</section>

<!-- HASIL -->
<section class="glass-card p-6">
    <h2 class="font-bold mb-4">Hasil</h2>

    <p id="statusTitle">-</p>
    <p id="statusDesc" class="text-sm text-gray-500 mt-2"></p>

    <!-- AI RESULT -->
    <button onclick="tanyaAI()" class="mt-6 w-full bg-purple-500 text-white py-2 rounded-xl">
        🤖 Tanya AI
    </button>

    <div id="aiResultBox" class="mt-4 p-3 bg-purple-50 rounded-xl text-sm hidden">
        Rekomendasi AI muncul di sini
    </div>
</section>

</main>

<script>
const whoData = {
    "Laki-laki": [
        {m:49.9,sd:1.9},{m:54.7,sd:2.0},{m:58.4,sd:2.1},{m:61.4,sd:2.2},
        {m:63.9,sd:2.3},{m:65.9,sd:2.4},{m:67.6,sd:2.5},{m:69.2,sd:2.6},
        {m:70.6,sd:2.7},{m:72.0,sd:2.8},{m:73.3,sd:2.9},{m:74.5,sd:3.0},
        {m:75.7,sd:3.1},{m:76.9,sd:3.2},{m:78.0,sd:3.3},{m:79.1,sd:3.4},
        {m:80.2,sd:3.5},{m:81.2,sd:3.6},{m:82.3,sd:3.7},{m:83.2,sd:3.8},
        {m:84.2,sd:3.9},{m:85.1,sd:4.0},{m:86.0,sd:4.1},{m:86.9,sd:4.2},
        {m:87.8,sd:4.3}
    ],
    "Perempuan": [
        {m:49.1,sd:1.9},{m:53.7,sd:2.0},{m:57.1,sd:2.1},{m:59.8,sd:2.2},
        {m:62.1,sd:2.3},{m:64.0,sd:2.4},{m:65.7,sd:2.5},{m:67.3,sd:2.6},
        {m:68.7,sd:2.7},{m:70.1,sd:2.8},{m:71.5,sd:2.9},{m:72.8,sd:3.0},
        {m:74.0,sd:3.1},{m:75.2,sd:3.2},{m:76.4,sd:3.3},{m:77.5,sd:3.4},
        {m:78.6,sd:3.5},{m:79.7,sd:3.6},{m:80.7,sd:3.7},{m:81.7,sd:3.8},
        {m:82.7,sd:3.9},{m:83.7,sd:4.0},{m:84.6,sd:4.1},{m:85.5,sd:4.2},
        {m:86.4,sd:4.3}
    ]
};

function hitungStunting() {
    const nama = document.getElementById("namaAnak").value;
    const umur = parseInt(document.getElementById("umurAnak").value);
    const gender = document.getElementById("genderAnak").value;
    const tinggi = parseFloat(document.getElementById("tinggiAnak").value);

    if (!nama || !gender || isNaN(umur) || isNaN(tinggi)) {
        alert("Lengkapi data!");
        return;
    }

    const ref = whoData[gender][umur];
    const z = (tinggi - ref.m) / ref.sd;

    let status = "";
    if (z < -3) status = "Sangat Stunting";
    else if (z < -2) status = "Stunting";
    else status = "Normal";

    document.getElementById("statusTitle").innerText = status;
    document.getElementById("statusDesc").innerText = "Z-score: " + z.toFixed(2);

    window.lastStatus = status;
}

function tanyaAI() {
    const status = window.lastStatus || "Normal";
    let ai = "";

    if (status === "Sangat Stunting") {
        ai = "Segera konsultasi dokter + perbaiki gizi tinggi protein.";
    } else if (status === "Stunting") {
        ai = "Tambah protein hewani & pantau pertumbuhan rutin.";
    } else {
        ai = "Pertumbuhan normal, pertahankan pola makan sehat.";
    }

    const box = document.getElementById("aiResultBox");
    box.innerText = ai;
    box.classList.remove("hidden");
}
</script>

</body>
</html>
